<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <script>
    const CONFIG = {
      BACKEND_URL: "https://widget.numbero.org",
      ASSISTANT_ID: "assistant_plumbing_zodiac_plumbing_heating_solutions_1775218936",
      PAGE_TITLE: "Zodiac Plumbing & Heating Solutions AI Widget",
      BADGE_TEXT: "Zodiac Plumbing & Heating Solutions",
      TITLE: "Talk to Zodiac Plumbing & Heating's AI Receptionist",
      SUBTITLE: "24/7 AI answers for all your plumbing questions in Manchester",
      START_BUTTON_TEXT: "Start Conversation",
      END_BUTTON_TEXT: "End Call",
      STATUS_READY: "Ready to assist",
      STATUS_CONNECTED: "Assistant connected",
      GREETING_TEXT: "<Greeting message from the assistant>",
      CONNECTING_TEXT: "Connecting to assistant...",
      CONNECTED_TEXT: "Connected. How can I help?",
      AGENT_READY_TEXT: "Assistant is ready.",
      DISCONNECTED_TEXT: "Call ended",
      CONNECTION_FAILED_TEXT: "Connection failed. Please try again.",
      PRIMARY_COLOR: "#087fc4",
      ACCENT_COLOR: "#65cbe5",
      ACCENT_COLOR_HOVER: "#4ab8d4",
      END_BUTTON_COLOR: "#ef4444",
      END_BUTTON_HOVER: "#dc2626",
      TEXT_COLOR: "#ffffff",
      SUBTITLE_COLOR: "#94a3b8",
      SUCCESS_COLOR: "#10B981",
    };
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice AI Widget</title>

  <style>
    :root {
      --primary-color: #E8604C;
      --accent-color: #E8604C;
      --accent-color-hover: #D14E3B;
      --end-button-color: #ef4444;
      --end-button-hover: #dc2626;
      --text-color: #ffffff;
      --subtitle-color: #94a3b8;
      --success-color: #10B981;
      --bg-dark: #0F2A45;
      --card-bg: #132F4C;
      --card-border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: transparent; }
    .widget-container { width: 100%; height: 100%; background: var(--card-bg); display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .gradient-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(232, 96, 76, 0.15) 0%, transparent 60%); z-index: 0; pointer-events: none; }
    .header { position: relative; z-index: 10; padding: 20px 24px 0; flex-shrink: 0; }
    .badge { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .badge-logo { height: 36px; width: auto; object-fit: contain; }
    .title { font-size: 1.6rem; font-weight: 700; color: var(--text-color); line-height: 1.2; margin-bottom: 8px; }
    .subtitle { color: var(--subtitle-color); font-size: 0.85rem; line-height: 1.5; }
    .visualizer-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; position: relative; z-index: 10; min-height: 0; }
    .pulsing-circle-container { position: relative; display: flex; align-items: center; justify-content: center; width: 100px; height: 100px; }
    .core-circle { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #087fc4 0%, #65cbe5 100%); display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
    .visualizer-bars { display: flex; align-items: center; justify-content: center; gap: 3px; height: 36px; }
    .bar { width: 6px; height: 6px; background: white; border-radius: 9999px; }
    .action-area { padding: 16px 24px 20px; position: relative; z-index: 10; background: rgba(0,0,0,0.2); border-top: 1px solid var(--card-border); flex-shrink: 0; }
    .transcript-area { text-align: center; margin-bottom: 16px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
    .transcript-text { font-size: 0.95rem; font-weight: 500; color: var(--text-color); }
    .call-button { width: 100%; padding: 14px; border-radius: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; }
    .call-button.start { background: linear-gradient(135deg, #087fc4 0%, #65cbe5 100%); color: white; }
    .call-button.end { background: var(--end-button-color); color: white; }
    #audioOutput { display: none; }
  </style>
</head>

<body>
  <audio id="audioOutput" autoplay></audio>
  <div class="widget-container">
    <div class="gradient-bg"></div>
    <div class="header">
      <div class="badge"><img src="logo.webp" alt="Zodiac Plumbing" class="badge-logo"></div>
      <h1 class="title">Talk to Zodiac Plumbing's AI Receptionist</h1>
      <p class="subtitle">24/7 AI answers for all your plumbing questions in Manchester</p>
    </div>
    <div class="visualizer-area">
      <div class="pulsing-circle-container">
        <div class="core-circle" id="coreCircle">
          <div class="visualizer-bars">
            <div class="bar" id="bar1"></div><div class="bar" id="bar2"></div><div class="bar" id="bar3"></div><div class="bar" id="bar4"></div><div class="bar" id="bar5"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="action-area">
      <div class="transcript-area"><p class="transcript-text" id="transcriptText">How can I help you today?</p></div>
      <button class="call-button start" id="callButton" onclick="toggleCall()">
        <span id="buttonText">Start Conversation</span>
      </button>
    </div>
  </div>
  <script src="https://raw.githubusercontent.com/Lyriqailimited/bpoai-widget-static/main/widget-bundle.js"></script>
  <script>
    const { PipecatClient, RTVIEvent, WebSocketTransport } = window;
    let isConnected = false;
    let pipecatClient = null;
    const audioElement = document.getElementById('audioOutput');
    const callButton = document.getElementById('callButton');
    const buttonText = document.getElementById('buttonText');
    const transcriptText = document.getElementById('transcriptText');

    function applyBranding() {
      document.title = CONFIG.PAGE_TITLE;
      document.querySelector('.title').textContent = CONFIG.TITLE;
      document.querySelector('.subtitle').textContent = CONFIG.SUBTITLE;
      buttonText.textContent = CONFIG.START_BUTTON_TEXT;
      transcriptText.textContent = CONFIG.GREETING_TEXT;
    }
    applyBranding();

    async function connect() {
      try {
        const config = {
          transport: new WebSocketTransport(),
          enableMic: true, enableCam: false,
          callbacks: {
            onConnected: () => { isConnected = true; callButton.className = 'call-button end'; buttonText.textContent = CONFIG.END_BUTTON_TEXT; },
            onDisconnected: () => { isConnected = false; callButton.className = 'call-button start'; buttonText.textContent = CONFIG.START_BUTTON_TEXT; },
            onBotTranscript: (data) => { transcriptText.textContent = 'Agent: ' + data.text; },
            onError: (err) => { console.error(err); }
          }
        };
        const client = new PipecatClient(config);
        pipecatClient = client;
        client.on(RTVIEvent.TrackStarted, (track, participant) => {
          if (!participant?.local && track.kind === "audio" && audioElement) {
            audioElement.srcObject = new MediaStream([track]);
          }
        });
        await client.initDevices();
        const response = await fetch(CONFIG.BACKEND_URL + '/frontend/connect', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assistant_id: CONFIG.ASSISTANT_ID })
        });
        const { ws_url } = await response.json();
        await client.connect({ wsUrl: ws_url });
      } catch (err) {
        console.error(err);
      }
    }

    async function disconnect() {
      if (pipecatClient) { await pipecatClient.disconnect(); pipecatClient = null; }
    }

    async function toggleCall() {
      if (isConnected) { await disconnect(); } else { await connect(); }
    }
  </script>
</body>
</html>
